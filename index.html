<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        :root {
            --page-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --calc-bg: #ffffff;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --display-bg: #1a1a1a;
            --display-color: #ffffff;
            --btn-bg: #f0f0f0;
            --btn-hover: #e0e0e0;
            --btn-color: #333333;
            --btn-shadow: rgba(0, 0, 0, 0.2);
            --operator-bg: #667eea;
            --operator-hover: #5568d3;
            --equals-bg: #764ba2;
            --equals-hover: #653a8a;
            --clear-bg: #ff6b6b;
            --clear-hover: #ee5a5a;
            --toggle-bg: rgba(255, 255, 255, 0.9);
            --toggle-color: #333333;
            --toggle-hover: rgba(255, 255, 255, 1);
            --history-bg: #ffffff;
            --history-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --history-title: #333333;
            --history-muted: #888888;
            --history-border: #eeeeee;
            --history-entry-bg: #f8f8fc;
            --history-result: #667eea;
        }

        [data-theme="dark"] {
            --page-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --calc-bg: #2d2d3a;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --display-bg: #0d0d12;
            --display-color: #e8e8e8;
            --btn-bg: #3d3d4d;
            --btn-hover: #4d4d5d;
            --btn-color: #e8e8e8;
            --btn-shadow: rgba(0, 0, 0, 0.4);
            --operator-bg: #5a6fd6;
            --operator-hover: #4a5fc6;
            --equals-bg: #8b5cb8;
            --equals-hover: #7a4ca8;
            --clear-bg: #e05555;
            --clear-hover: #d04545;
            --toggle-bg: rgba(45, 45, 58, 0.95);
            --toggle-color: #e8e8e8;
            --toggle-hover: rgba(55, 55, 68, 1);
            --history-bg: #2d2d3a;
            --history-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --history-title: #e8e8e8;
            --history-muted: #9a9aaa;
            --history-border: #3d3d4d;
            --history-entry-bg: #363648;
            --history-result: #8b9cf0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--page-gradient);
            padding: 20px;
            padding-top: 80px;
            transition: background 0.3s ease;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 24px;
            width: 100%;
            max-width: 400px;
        }

        @media (min-width: 900px) {
            body {
                padding-top: 20px;
            }

            .app-layout {
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
                max-width: 860px;
                gap: 32px;
            }

            .app-layout .calculator {
                flex: 0 0 400px;
            }

            .app-layout .history-panel {
                flex: 1;
                min-width: 280px;
                max-width: 400px;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: var(--toggle-bg);
            color: var(--toggle-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .theme-toggle:active {
            transform: scale(0.98);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .theme-toggle .icon-sun {
            display: none;
        }

        .theme-toggle .icon-moon {
            display: block;
        }

        [data-theme="dark"] .theme-toggle .icon-sun {
            display: block;
        }

        [data-theme="dark"] .theme-toggle .icon-moon {
            display: none;
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .display {
            background: var(--display-bg);
            color: var(--display-color);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .buttons button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-color);
        }

        .buttons button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-shadow);
        }

        .buttons button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--btn-shadow);
        }

        .buttons .operator {
            background: var(--operator-bg);
            color: #ffffff;
        }

        .buttons .operator:hover {
            background: var(--operator-hover);
        }

        .buttons .equals {
            background: var(--equals-bg);
            color: #ffffff;
        }

        .buttons .equals:hover {
            background: var(--equals-hover);
        }

        .buttons .clear {
            background: var(--clear-bg);
            color: #ffffff;
        }

        .buttons .clear:hover {
            background: var(--clear-hover);
        }

        .zero {
            grid-column: span 2;
        }

        .history-panel {
            background: var(--history-bg);
            border-radius: 20px;
            box-shadow: var(--history-shadow);
            padding: 24px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: min(420px, 50vh);
        }

        @media (min-width: 900px) {
            .history-panel {
                max-height: calc(100vh - 40px);
                min-height: 320px;
            }
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .history-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--history-title);
        }

        .history-clear {
            background: transparent;
            border: 1px solid var(--history-border);
            color: var(--history-muted);
            font-size: 0.8125rem;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }

        .history-clear:hover {
            color: var(--history-title);
            border-color: var(--history-muted);
            background: var(--history-entry-bg);
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--history-border);
            border-radius: 3px;
        }

        .history-entry {
            background: var(--history-entry-bg);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.9375rem;
            line-height: 1.4;
        }

        .history-expression {
            color: var(--history-muted);
            word-break: break-all;
        }

        .history-result {
            color: var(--history-result);
            font-weight: 600;
            margin-top: 4px;
        }

        .history-empty {
            color: var(--history-muted);
            font-size: 0.9375rem;
            text-align: center;
            padding: 24px 12px;
        }
    </style>
</head>
<body>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Переключить тему" title="Переключить тему">
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12.1 22c-4.6 0-8.4-3.8-8.4-8.4 0-3.5 2.1-6.5 5.2-7.8-.3 1-.5 2-.5 3.1 0 4.6 3.8 8.4 8.4 8.4 1.1 0 2.1-.2 3.1-.5-1.3 3.1-4.3 5.2-7.8 5.2z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm0-16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 20a1 1 0 0 1-1-1v-2a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1zM4.22 4.22a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 1 1-1.41 1.41L4.22 5.64a1 1 0 0 1 0-1.42zm15.16 15.16a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.41 1.41l-1.42-1.42a1 1 0 0 1 0-1.41zM2 12a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zm18 0a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2h-2a1 1 0 0 1-1-1zM4.22 19.78a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 0 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0zm15.16-15.16a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 1 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0z"/>
        </svg>
    </button>
    <div class="app-layout">
        <div class="calculator">
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">/</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button class="operator" onclick="deleteLast()">⌫</button>

                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>

                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="equals" onclick="calculate()" rowspan="2">=</button>

                <button class="zero" onclick="appendNumber('0')">0</button>
                <button onclick="appendDecimal()">.</button>
            </div>
        </div>

        <aside class="history-panel" aria-label="Журнал операций">
            <div class="history-header">
                <h2>Журнал операций</h2>
                <button type="button" class="history-clear" id="historyClear" title="Очистить журнал">Очистить</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </aside>
    </div>

    <script>
        (function initTheme() {
            const stored = localStorage.getItem('calculator-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
        })();

        document.getElementById('themeToggle').addEventListener('click', function() {
            const root = document.documentElement;
            const isDark = root.getAttribute('data-theme') === 'dark';
            const next = isDark ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('calculator-theme', next);
        });

        const HISTORY_KEY = 'calculator-history';
        const HISTORY_LIMIT = 100;

        let display = document.getElementById('display');
        let historyList = document.getElementById('historyList');
        let currentInput = '0';
        let shouldResetDisplay = false;
        let operationHistory = [];

        function formatExpression(expr) {
            return expr.replace(/\*/g, '×');
        }

        function loadHistory() {
            try {
                const stored = localStorage.getItem(HISTORY_KEY);
                operationHistory = stored ? JSON.parse(stored) : [];
                if (!Array.isArray(operationHistory)) {
                    operationHistory = [];
                }
            } catch {
                operationHistory = [];
            }
            renderHistory();
        }

        function saveHistory() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(operationHistory));
        }

        function renderHistory() {
            historyList.innerHTML = '';
            if (operationHistory.length === 0) {
                const empty = document.createElement('li');
                empty.className = 'history-empty';
                empty.textContent = 'Пока нет операций';
                historyList.appendChild(empty);
                return;
            }
            operationHistory.forEach(function(entry) {
                const li = document.createElement('li');
                li.className = 'history-entry';
                li.innerHTML =
                    '<div class="history-expression">' + escapeHtml(entry.expression) + ' =</div>' +
                    '<div class="history-result">' + escapeHtml(entry.result) + '</div>';
                historyList.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addToHistory(expression, result) {
            if (expression === 'Ошибка' || !expression.trim()) {
                return;
            }
            operationHistory.unshift({
                expression: formatExpression(expression),
                result: String(result)
            });
            if (operationHistory.length > HISTORY_LIMIT) {
                operationHistory.length = HISTORY_LIMIT;
            }
            saveHistory();
            renderHistory();
        }

        function clearHistory() {
            operationHistory = [];
            saveHistory();
            renderHistory();
        }

        document.getElementById('historyClear').addEventListener('click', clearHistory);
        loadHistory();

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (!currentInput.includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            const expressionBefore = currentInput;
            try {
                let expression = expressionBefore.replace(/×/g, '*');

                if (expression.includes('/0') && !expression.includes('/0.')) {
                    addToHistory(expressionBefore, 'Ошибка');
                    currentInput = 'Ошибка';
                    updateDisplay();
                    shouldResetDisplay = true;
                    return;
                }

                const result = Function('"use strict"; return (' + expression + ')')();

                if (isNaN(result) || !isFinite(result)) {
                    addToHistory(expressionBefore, 'Ошибка');
                    currentInput = 'Ошибка';
                } else {
                    const resultStr = result.toString();
                    addToHistory(expressionBefore, resultStr);
                    currentInput = resultStr;
                }

                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                addToHistory(expressionBefore, 'Ошибка');
                currentInput = 'Ошибка';
                updateDisplay();
                shouldResetDisplay = true;
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
